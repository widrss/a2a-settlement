name: Code Review
description: Tasks that require reviewing code from repositories
attestation_level: signed
escrow_amount: 100

tasks:
  - id: review-commits
    type: data-retrieval
    description: Review recent commits for security issues
    params:
      repo: google/A2A
      per_page: 10

  - id: review-repo-structure
    type: data-retrieval
    description: Analyze repository structure and dependencies
    params:
      repo: google/A2A
